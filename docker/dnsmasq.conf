# bty-web container's dnsmasq config. TFTP-only -- bty does NOT
# run any DHCP role in either the appliance or the container.
# The operator's LAN DHCP server is configured to point PXE
# clients at this container via option 60/66/67 tagging.

# Disable DNS; we only want TFTP from this daemon.
port=0

# TFTP serving for the iPXE binaries the operator's DHCP server
# directs PXE clients to fetch.
enable-tftp
tftp-root=/var/lib/tftpboot

# Drop privileges after binding UDP 69 (which the setcap on the
# dnsmasq binary allows even when we're the unprivileged ``bty``
# user). dnsmasq's own user-switching keeps the post-bind process
# unprivileged.
user=bty
group=bty

# Log to stderr so docker logs captures TFTP traffic alongside
# bty-web's stdout. ``log-facility=-`` is dnsmasq idiom for stderr.
log-facility=-
log-queries

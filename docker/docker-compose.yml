# Convenience compose file for trying the bty-web container.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up
#   -> http://localhost:8080/ui   (login: bty / bty)
#
# Uses a docker-managed named volume (``bty-data``) so the in-
# container bty user (uid 999) owns it without any host-side
# chown step. To inspect or feed images from the host filesystem
# instead:
#
#   1. Pre-create the dir owned by uid 999 ("the bty user"):
#        mkdir -p ./bty-data && sudo chown -R 999:999 ./bty-data
#   2. Replace the volume line with: ``- ./bty-data:/var/lib/bty``
#
# This container is HTTP-only. UEFI HTTP-Boot targets work
# directly against it; TFTP-only PXE clients need either a
# separate TFTP server (operator-run dnsmasq alongside) or the
# bty-server appliance image (which bundles dnsmasq).

services:
  bty-web:
    image: ghcr.io/safl/bty-web:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - bty-data:/var/lib/bty
    # Override defaults if you want to point clients at a public
    # hostname or change the port -- BTY_WEB_HOST / BTY_WEB_PORT
    # are read at startup.
    # environment:
    #   BTY_WEB_PORT: "8080"

volumes:
  bty-data:

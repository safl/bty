# Run bty + withcache as containers on a host with podman (e.g. a nosi headless
# image). bty is the policy/PXE layer; withcache holds the image bytes.
#
# Reference copy; operators usually consume the generated one via
# `uvx bty-lab init` (it pins image tags to the CLI version and emits an
# envvars file + a populated bty.toml alongside). Quickstart with this file:
#
#   cp envvars.example envvars && "${EDITOR:-vi}" envvars   # set passwords
#   "${EDITOR:-vi}" bty.toml                                # set [withcache] url etc.
#   podman compose --env-file envvars up -d
#   #   http://<host>:8080/ui   (bty)      http://<host>:3000/   (withcache)
#
#   # add TFTP for BIOS clients that bootstrap over it:
#   podman compose --env-file envvars --profile tftp up -d
#
# v0.42+: bty-web's operator config lives in ./bty.toml (bind-mounted below);
# the env block carries only BTY_CONFIG_FILE. Per-key env overrides
# (BTY_<SECTION>_<KEY>) still work for one-shot runs / k8s Secrets.
#
# Your LAN's DHCP server points clients at this host (next-server/bootfile, or
# HTTPClient).

services:
  withcache:
    image: ghcr.io/safl/withcache:latest
    restart: unless-stopped
    # Hard-set the resolver so this works on stock Ubuntu hosts where
    # systemd-resolved owns /etc/resolv.conf and aardvark-dns isn't installed.
    dns:
      - ${BTY_DNS:-1.1.1.1}
    ports:
      - "3000:3000"
    environment:
      WITHCACHE_ADMIN_PASSWORD: ${WITHCACHE_ADMIN_PASSWORD:?set in envvars}
    # Cap the cache (delete artifacts in the UI to free space when full):
    # command: ["withcache-server","--host","0.0.0.0","--port","3000",
    #           "--data-dir","/data","--max-bytes","100G"]
    volumes:
      - ${BTY_HOST_DATA_DIR:-./data}/withcache:/data

  bty-web:
    image: ghcr.io/safl/bty-web:latest
    restart: unless-stopped
    # See note on withcache.dns -- same reason.
    dns:
      - ${BTY_DNS:-1.1.1.1}
    ports:
      - "8080:8080"
    environment:
      BTY_CONFIG_FILE: /etc/bty/bty.toml
    volumes:
      - ${BTY_HOST_DATA_DIR:-./data}/bty:/var/lib/bty
      # RW (no :ro) so Settings-page edits land back on the host file,
      # matching the Quadlet unit's mount.
      - ./bty.toml:/etc/bty/bty.toml
    depends_on:
      - withcache

  # TFTP for BIOS/legacy PXE clients: they fetch the small iPXE NBP over udp/69,
  # then chainload bty's HTTP iPXE script and pull kernel / initrd / squashfs
  # from bty-web over HTTP. TFTP's data transfer uses an ephemeral UDP port, so
  # this service uses host networking; bty-web and withcache use the bridge with
  # published ports. The NBPs (including bty's custom embedded-chain ipxe.efi)
  # are baked into the image -- no volume, no shared data.
  tftp:
    image: ghcr.io/safl/bty-tftp:latest
    # For local development, build it instead: `podman build -t bty-tftp deploy/tftp`.
    profiles: ["tftp"]
    restart: unless-stopped
    network_mode: host

# Run bty + withcache as containers on a host with podman (e.g. a nosi headless
# image). bty is the policy/PXE layer; withcache holds the image bytes. Pull new
# images to upgrade.
#
#   # one-time: this host's LAN address that booting clients reach
#   export HOST_ADDR=10.0.0.5
#   export WITHCACHE_ADMIN_PASSWORD=change-me
#
#   podman compose -f deploy/compose.yml up -d
#   #   http://<host>:8080/ui   (bty)      http://<host>:3000/   (withcache)
#
#   # add TFTP for BIOS clients that bootstrap over it:
#   podman compose -f deploy/compose.yml --profile tftp up -d
#
# Your LAN's DHCP server points clients at this host (next-server/bootfile, or
# HTTPClient).

services:
  withcache:
    image: ghcr.io/safl/withcache:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WITHCACHE_ADMIN_PASSWORD: ${WITHCACHE_ADMIN_PASSWORD:-}
    # Cap the cache (delete artifacts in the UI to free space when full):
    # command: ["withcache-server","--host","0.0.0.0","--port","3000",
    #           "--data-dir","/data","--max-bytes","100G"]
    volumes:
      - withcache-data:/data

  bty-web:
    image: ghcr.io/safl/bty-web:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # bty prefers withcache as the image SOURCE for artifacts it holds, and
      # serves the origin for the rest. bty hands this URL to booting clients,
      # so set it to the host's LAN address those machines reach. Override
      # by exporting BTY_WITHCACHE_URL before ``podman compose up`` if
      # withcache lives elsewhere.
      BTY_WITHCACHE_URL: ${BTY_WITHCACHE_URL:-http://${HOST_ADDR:?set HOST_ADDR}:3000}
      # TFTP probe target for the Netboot page diagnostic. The bty-tftp
      # sidecar uses ``network_mode: host`` -- so udp/69 is on the host's
      # LAN address, not on bty-web's bridge-network loopback. Default to
      # HOST_ADDR; override BTY_TFTP_PROBE_HOST if TFTP runs elsewhere
      # (e.g. on the LAN router).
      BTY_TFTP_PROBE_HOST: ${BTY_TFTP_PROBE_HOST:-${HOST_ADDR}}
    volumes:
      - bty-data:/var/lib/bty
    depends_on:
      - withcache

  # TFTP for BIOS/legacy PXE clients: they fetch the small iPXE NBP over udp/69,
  # then chainload bty's HTTP iPXE script and pull kernel / initrd / squashfs
  # from bty-web over HTTP. TFTP's data transfer uses an ephemeral UDP port, so
  # this service uses host networking; bty-web and withcache use the bridge with
  # published ports. The NBPs (including bty's custom embedded-chain ipxe.efi)
  # are baked into the image -- no volume, no shared data.
  tftp:
    image: ghcr.io/safl/bty-tftp:latest
    # For local development, build it instead: `podman build -t bty-tftp deploy/tftp`.
    profiles: ["tftp"]
    restart: unless-stopped
    network_mode: host

volumes:
  withcache-data:
  bty-data:

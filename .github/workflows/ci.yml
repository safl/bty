name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check
      - run: uv run ruff format --check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --group dev
      - run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --group dev
      - run: uv run pytest

  flash-integration:
    name: Flash integration (loop device)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install tools the integration tests need
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils \
            zstd \
            gdisk \
            e2fsprogs \
            parted \
            exfatprogs \
            exfat-fuse
          # GHA Ubuntu runners don't have the in-kernel exfat module
          # auto-loaded; try modprobe first.
          sudo modprobe exfat 2>/dev/null || true
          # If the kernel module's still unavailable, point ``mount
          # -t exfat`` at the FUSE helper. exfat-fuse installs
          # ``mount.exfat-fuse`` but mount(8) looks for
          # ``/sbin/mount.exfat`` specifically when delegating
          # unknown types; symlink bridges the gap.
          if ! grep -qw exfat /proc/filesystems 2>/dev/null; then
            FUSE_HELPER=$(command -v mount.exfat-fuse || true)
            if [ -n "${FUSE_HELPER}" ] && [ ! -e /sbin/mount.exfat ]; then
              sudo ln -sf "${FUSE_HELPER}" /sbin/mount.exfat
              echo "linked /sbin/mount.exfat -> ${FUSE_HELPER}"
            fi
          fi
      - run: uv sync --all-extras --group dev
      # Integration tests use losetup + dd against a real loop device,
      # so they need root. The default pytest run excludes them via the
      # addopts in pyproject.toml; override with -m integration here.
      - run: sudo -E env "PATH=$PATH" uv run pytest -m integration -v

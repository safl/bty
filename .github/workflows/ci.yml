name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check
      - run: uv run ruff format --check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --group dev
      - run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --group dev
      - run: uv run pytest

  flash-integration:
    name: Flash integration (loop device)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install tools the integration tests need
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils \
            zstd \
            gdisk \
            e2fsprogs \
            parted \
            exfatprogs \
            exfat-fuse
          # Ubuntu runners often don't auto-load the in-kernel exfat
          # module; try to load it now and fall back to FUSE (exfat-
          # fuse provides /sbin/mount.exfat which mount -t exfat
          # delegates to when the kernel module is absent).
          sudo modprobe exfat 2>/dev/null || true
      - run: uv sync --all-extras --group dev
      # Integration tests use losetup + dd against a real loop device,
      # so they need root. The default pytest run excludes them via the
      # addopts in pyproject.toml; override with -m integration here.
      - run: sudo -E env "PATH=$PATH" uv run pytest -m integration -v

name: CI

# Single unified pipeline. The full build + test suite runs on every PR and on
# pushes to ``main`` (catching issues before they land); pushing a ``v*`` tag
# runs the same suite and additionally publishes (the publish jobs are tag-
# gated). The numbered jobs below:
#   0. ``check-not-published``    - aborts the workflow before any
#                                   artifact is rebuilt if PyPI
#                                   already has the tag's version.
#                                   This is what prevents drift:
#                                   without it, a retag-after-PyPI
#                                   would rebuild GH release assets +
#                                   ghcr.io container from a newer
#                                   commit while PyPI is frozen at
#                                   the original publish, leaving
#                                   the artifact destinations out
#                                   of sync.
#   1. ``test``                   - lint + typecheck + pytest matrix.
#   2. ``build-wheel`` (gated)    - uv build of the bty-lab wheel + sdist.
#   3. ``build-media`` (gated)    - the netboot live image (usb-x86
#                                   builds in its own job below).
#   4. ``test-pxe`` (gated)       - brings bty up as containers and
#                                   PXE-boots a client QEMU VM against
#                                   it; asserts the chain end-to-end.
#   4b. ``test-usb-grow`` (gated) - boots the freshly-built bty-usb
#                                   ISO on a 4 GiB raw disk in QEMU,
#                                   asserts bty-usb-grow.service grew
#                                   BTY_IMAGES from 1 MiB to fill the
#                                   stick.
#   4c. ``test-usb-ventoy``(gated)- installs Ventoy on a 4 GiB loop-
#                                   attached disk, drops the bty .iso +
#                                   a sentinel image + a catalog.toml
#                                   onto the data partition, boots in
#                                   QEMU. Asserts bty-images-discover
#                                   bind-mounts the operator drop and
#                                   the TUI's actual discovery code
#                                   surfaces both the local image and
#                                   the catalog entry.
#   5. ``docs`` (gated)           - HTML + PDF build. Part of the
#                                   release chain so a broken PDF
#                                   (e.g. an unsupported MyST
#                                   directive or a non-ASCII char
#                                   that pdflatex won't render)
#                                   blocks the publish - docs.yml
#                                   on its own only runs on push,
#                                   not on tag.
#   6. ``attach-to-release``      - downloads every workflow artifact
#                                   and attaches them to the GitHub
#                                   release at the same tag.
#   7. ``publish-pypi`` (last)    - trusted publishing of the wheel
#                                   + sdist. Strictly gated on every
#                                   prior job succeeding so PyPI
#                                   never sees a half-baked release
#                                   (PyPI is for life: a published
#                                   version cannot be re-uploaded).
#
# ``workflow_dispatch`` runs ``test`` + ``build-wheel`` only - smoke
# test of the package side. Ad-hoc media builds happen locally via
# the top-level Makefile (``make build VARIANT=usb-x86|netboot-x86``).
#
# First publish (claiming the bty-lab name) requires a one-time PyPI
# setup: register a Pending Publisher on https://pypi.org targeting:
#   PyPI Project Name:  bty-lab
#   Owner:              safl
#   Repository:         bty
#   Workflow filename:  ci-cd.yml
#   Environment name:   pypi
# Then push a ``v*`` tag (e.g. ``v0.1.0``) and this workflow claims
# and uploads the release.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ---------------- release-integrity preflight ----------------------------
  check-not-published:
    name: Refuse to release a version PyPI already has
    runs-on: ubuntu-latest
    steps:
      - name: Abort if PyPI already has this version
        # Tag pushes only: workflow_dispatch builds the wheel for a
        # smoke check and doesn't touch any release destination, so
        # the integrity check is a no-op there.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          echo "Checking PyPI for bty-lab==${version}..."
          payload=$(curl -sfL "https://pypi.org/pypi/bty-lab/json")
          if echo "$payload" | python3 -c "import sys, json; d = json.load(sys.stdin); sys.exit(0 if '${version}' in d['releases'] else 1)"; then
            echo
            echo "::error::PyPI already has bty-lab==${version}. Refusing to re-release."
            echo
            echo "Releases are immutable: PyPI cannot be overwritten, but the"
            echo "GitHub release page assets and the ghcr.io container would be"
            echo "rebuilt from this newer commit and silently drift away from"
            echo "the wheel on PyPI. Bump pyproject.toml to a new version,"
            echo "retag, and push."
            exit 1
          fi
          echo "OK: PyPI does not have bty-lab==${version} yet; release continues."

  # ---------------- gating -------------------------------------------------
  test:
    name: Test (lint + typecheck + pytest ${{ matrix.python }})
    needs: check-not-published
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --group dev
      # Mirror what ci.yml runs on every push - lint + format + types
      # + tests. We duplicate the steps inline rather than route
      # through ``workflow_run`` so the gating dependency graph is
      # explicit in this one file.
      - run: uv run ruff check
      - run: uv run ruff format --check
      # mypy only on one matrix slot: typecheck output is identical
      # across Python versions (mypy reads pyproject's
      # ``python_version = "3.11"`` not the runtime), so duplicating it
      # 4x would burn CI minutes for no extra signal. 3.12 is the
      # arbitrary single slot.
      - if: matrix.python == '3.12'
        run: uv run mypy src
      - run: uv run pytest

  # Full pre-commit set (ruff + shellcheck + hygiene), matching local `make lint`.
  lint:
    name: Lint (pre-commit)
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  flash-integration:
    name: Flash integration (loop device)
    needs: check-not-published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install tools the integration tests need
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils \
            zstd \
            gdisk \
            e2fsprogs \
            parted \
            exfatprogs \
            exfat-fuse
          sudo modprobe exfat 2>/dev/null || true
          if ! grep -qw exfat /proc/filesystems 2>/dev/null; then
            FUSE_HELPER=$(command -v mount.exfat-fuse || true)
            if [ -n "${FUSE_HELPER}" ] && [ ! -e /sbin/mount.exfat ]; then
              sudo ln -sf "${FUSE_HELPER}" /sbin/mount.exfat
            fi
          fi
      - run: uv sync --all-extras --group dev
      # Integration tests use losetup + dd against a real loop device, so they
      # need root; the default pytest run excludes them (pyproject addopts).
      - run: sudo -E env "PATH=$PATH" uv run pytest -m integration -v

  # ---------------- build --------------------------------------------------
  build-wheel:
    name: Build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-ipxe:
    name: Build custom iPXE (x86_64-efi)
    # bty's embedded-chain ipxe.efi: the bootstrap NBP whose script chains
    # to bty-web's HTTP /pxe-bootstrap.ipxe, so the operator's DHCP needs
    # only a single bootfile (no userclass logic). Baked into the bty-web
    # (HTTP-Boot) and bty-tftp (TFTP) images and attached to the release.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install iPXE build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential liblzma-dev mtools perl git
      - name: Build custom ipxe.efi
        run: make ipxe IPXE_OUT="$PWD/dist/ipxe"
      - name: Name it with the package version
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          test -n "$version" || { echo "could not read version"; exit 1; }
          mv dist/ipxe/ipxe.efi "dist/ipxe/bty-ipxe-x86_64-v${version}.efi"
      - uses: actions/upload-artifact@v7
        with:
          name: bty-ipxe-x86_64
          path: dist/ipxe/bty-ipxe-x86_64-v*.efi
          if-no-files-found: error

  build-media:
    name: Build ${{ matrix.variant }} image
    needs: test
    runs-on: ubuntu-latest
    # The netboot-x86 live build finishes in <30 min. The failure mode is a
    # HANG, not slowness (the in-VM apt / git clone / pip steps have no
    # timeout), so a 45 min cap fails a stuck build fast; the ``cijoe-output``
    # artifact (uploaded below, if: always()) carries the captured console +
    # report.html for the post-mortem.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # ``variant`` is the user-facing name (``make build VARIANT=...``).
        # ``usb-x86`` lives in the dedicated ``build-usb-x86`` job below so
        # ``test-usb-grow`` can fire as soon as the .iso is built.
        include:
          - variant: netboot-x86
            kind: live
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (live variant)
        # Ubuntu's ``live-build`` package (20230502 on Noble) still
        # fetches ``dists/<release>/Contents-<arch>.gz`` to resolve
        # which package provides the kernel image - but Debian moved
        # Contents-*.gz under ``main/`` (per-component) for every
        # active release, so the top-level URL 404s and the build
        # aborts. Debian's pool ships a newer live-build (20240208+)
        # with the fixed URL handling. Grab the latest .deb straight
        # from the pool via wget + dpkg - skips the apt + GPG dance
        # since live-build is Architecture: all (shell + perl, no
        # libc dep) and a one-shot cross-distro install is safe.
        if: matrix.kind == 'live'
        run: |
          set -eu
          sudo apt-get update
          # ``debootstrap squashfs-tools xorriso debian-archive-keyring``
          # are live-build's required deps. ``exfatprogs`` (mkfs.exfat)
          # is needed by the usb-x86 variant's post-build step that
          # appends a writable BTY_IMAGES partition to the cooked
          # hybrid ISO; harmless on the netboot-x86 build that doesn't
          # run that step. (sfdisk + xz, also used by the post-build
          # step, are in util-linux + xz-utils, always present on
          # Ubuntu runners.) ``exfat-fuse`` (the FUSE mount helper)
          # is the fallback path when the kernel exfat module isn't
          # loadable on the runner; the bake's BTY_IMAGES populate
          # step tries kernel-mount first, then ``mount.exfat-fuse``.
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso debian-archive-keyring \
            exfatprogs exfat-fuse
          POOL=http://ftp.debian.org/debian/pool/main/l/live-build
          LB_DEB=$(curl -s "$POOL/" \
              | grep -oE 'live-build_[0-9][^"<]*\.deb' \
              | sort -V | tail -1)
          if [ -z "$LB_DEB" ]; then
              echo "could not find live-build .deb in $POOL/" >&2
              exit 1
          fi
          echo "Fetching $LB_DEB"
          wget -q "$POOL/$LB_DEB"
          sudo dpkg -i "$LB_DEB"
          lb --version

      - name: Enable KVM access for the runner
        # GHA's hosted Linux runners ship /dev/kvm but the runner user
        # isn't in the kvm group, so QEMU's ``-accel kvm`` fails with
        # "Permission denied". Drop a udev rule that makes the device
        # world-accessible (mode 0666). Standard pattern for hosted
        # runners; without it the cloud-init bake hits a permission
        # error on the first qemu-system-x86_64 invocation.
        if: matrix.kind == 'disk'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo kvm-ok || true
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build image
        run: make build VARIANT=${{ matrix.variant }}

      # cijoe captures the full run (per-command output incl. the
      # QEMU guest console + a rendered report.html) under
      # cijoe/cijoe-output/. Upload it ALWAYS -- on a hang/timeout
      # this is the only window into what the bake was stuck on.
      - name: Upload cijoe output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cijoe-output-${{ matrix.variant }}
          path: cijoe/cijoe-output
          if-no-files-found: warn

      # Dedicated upload of just the HTML report for a one-click
      # post-mortem without unpacking the whole output bundle.
      - name: Upload cijoe report.html
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cijoe-report-${{ matrix.variant }}
          path: cijoe/cijoe-output/report.html
          if-no-files-found: warn

      - name: Upload artifact (netboot-x86 variant)
        if: matrix.variant == 'netboot-x86'
        uses: actions/upload-artifact@v7
        with:
          name: bty-netboot-x86_64
          path: |
            ~/system_imaging/disk/bty-netboot-x86_64-v*.vmlinuz
            ~/system_imaging/disk/bty-netboot-x86_64-v*.initrd
            ~/system_imaging/disk/bty-netboot-x86_64-v*.squashfs
            ~/system_imaging/disk/bty-netboot-x86_64-v*.sha256

  # ---------------- usb-x86 (split out for early test-usb-grow gate) -------
  # Same content as the matrix's previous ``usb-x86`` entry but as a
  # standalone job so ``test-usb-grow`` can depend on just this (and
  # not wait on the other build jobs). Dedup-vs-DRY
  # tradeoff: a little YAML repetition for ~10 min off the test's
  # critical path.
  build-usb-x86:
    name: Build usb-x86 image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (live)
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso debian-archive-keyring \
            exfatprogs exfat-fuse
          POOL=http://ftp.debian.org/debian/pool/main/l/live-build
          LB_DEB=$(curl -s "$POOL/" \
              | grep -oE 'live-build_[0-9][^"<]*\.deb' \
              | sort -V | tail -1)
          if [ -z "$LB_DEB" ]; then
              echo "could not find live-build .deb in $POOL/" >&2
              exit 1
          fi
          echo "Fetching $LB_DEB"
          wget -q "$POOL/$LB_DEB"
          sudo dpkg -i "$LB_DEB"
          lb --version

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build usb-x86 image
        run: make build VARIANT=usb-x86

      - name: Upload cijoe output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cijoe-output-usb-x86
          path: cijoe/cijoe-output
          if-no-files-found: warn

      - name: Upload cijoe report.html
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cijoe-report-usb-x86
          path: cijoe/cijoe-output/report.html
          if-no-files-found: warn

      - name: Upload artifact (bty-usb-x86_64.iso)
        uses: actions/upload-artifact@v7
        with:
          name: bty-usb-x86_64-iso
          path: |
            ~/system_imaging/disk/bty-usb-x86_64-v*.iso
            ~/system_imaging/disk/bty-usb-x86_64-v*.iso.sha256

  # ---------------- verify ------------------------------------------------
  test-pxe:
    name: PXE chain test (containerized bty + client QEMU VM)
    needs: build-media
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The bty-web container (built from this checkout) is the server; a QEMU
    # client PXE-boots against it over a host bridge, with a test-side dnsmasq
    # (DHCP + TFTP) on the bridge. `make test-pxe` builds the image and runs the
    # whole chain (cijoe/scripts/pxe_prepare.py + pxe_run_chain_test.py).
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools (qemu, dnsmasq, ipxe, bridge)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            dnsmasq \
            ipxe \
            iproute2 \
            cpu-checker

      - name: Enable KVM access for the runner
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download netboot artifacts
        uses: actions/download-artifact@v8
        with:
          name: bty-netboot-x86_64
          path: ~/system_imaging/disk/

      - name: Run PXE chain test (builds the bty-web image, runs the chain)
        run: make test-pxe

      - name: Upload cijoe report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-cijoe-output
          path: cijoe/cijoe-output/
          if-no-files-found: warn

      - name: Upload test workspace on failure (serial logs)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-workspace
          path: cijoe/_build/test-pxe/
          if-no-files-found: warn

  # ---------------- usb auto-grow test (gating) ---------------------------
  # Boots the freshly-built bty-usb ISO in QEMU on a 4 GiB raw disk,
  # lets the first-boot bty-usb-grow service run, then ``parted``-s the
  # disk image to assert the BTY_IMAGES partition grew. Full output
  # capture (cijoe.run_local everywhere, serial log dumped on every
  # outcome) so a failure leaves a real signal in the cijoe report,
  # not a silently-eaten Popen stderr.
  test-usb-grow:
    name: USB auto-grow test (QEMU boot + parted)
    needs: build-usb-x86
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools (qemu, parted)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            parted \
            cpu-checker

      - name: Enable KVM access for the runner
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Download bty-usb ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: bty-usb-x86_64-iso
          path: ~/system_imaging/disk/

      - name: Run USB auto-grow test
        run: make test-usb-grow

      - name: Upload cijoe report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: usb-grow-test-cijoe-output
          path: cijoe/cijoe-output/
          if-no-files-found: warn

      - name: Upload test workspace on failure (disk image, serial log)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: usb-grow-test-workspace
          path: cijoe/_build/test-usb-grow/
          if-no-files-found: warn

  # ---------------- usb-ventoy verify -------------------------------------
  # Real Ventoy install on a 4 GiB loop-attached disk + bty .iso +
  # sentinel image + catalog.toml dropped on the data partition.
  # Boots via QEMU, asserts inside the VM that the live env's
  # bty-images-discover.service finds the operator drop and the bty
  # TUI's actual discovery code surfaces both the local image and the
  # catalog entry. Mirrors test-usb-grow's shape; needs exfat-fuse so
  # the host can stage onto Ventoy's exFAT data partition (WSL2 dev
  # boxes lack the kernel module, hence the local-run gap noted in
  # the test commit -- CI is the verification path).
  test-usb-ventoy:
    name: USB Ventoy-boot test (QEMU + in-VM TUI/catalog asserts)
    needs: build-usb-x86
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools (qemu, exfat-fuse)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            exfat-fuse \
            exfatprogs \
            cpu-checker

      - name: Enable KVM access for the runner
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Download bty-usb ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: bty-usb-x86_64-iso
          path: ~/system_imaging/disk/

      - name: Run USB Ventoy-boot test
        run: make test-usb-ventoy

      - name: Upload cijoe report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: usb-ventoy-test-cijoe-output
          path: cijoe/cijoe-output/
          if-no-files-found: warn

      - name: Upload test workspace on failure (disk image, serial log)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: usb-ventoy-test-workspace
          # cijoe.qemu.wrapper.Guest writes the QEMU serial console to
          # ``{qemu.guests.<name>.path}/serial.output``; for the
          # ``usb-ventoy`` guest that path is ``~/system_imaging/usb-ventoy/``
          # (NOT ``cijoe/_build/test-usb-ventoy/`` -- the latter is
          # test-usb-grow's pattern that I wrongly copy-pasted earlier).
          path: |
            ~/system_imaging/usb-ventoy/serial.output
            ~/system_imaging/usb-ventoy/disk.img
          if-no-files-found: warn

  # ---------------- docs (gates the release) -------------------------------
  docs:
    name: Build docs (HTML + PDF)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      # Same package set as docs.yml's standalone build, so a tag
      # push exercises identical machinery to a main-push docs run.
      - name: Install LaTeX (for PDF build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre \
            fonts-freefont-otf \
            latexmk \
            make
      - name: Install docs tooling
        run: uv tool install ./docs/tooling
      - name: Build HTML
        working-directory: docs
        run: bty-docs-build-html
      - name: Build PDF
        working-directory: docs
        run: bty-docs-build-pdf
      - uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
      - uses: actions/upload-artifact@v7
        with:
          name: docs-pdf
          path: docs/_build/latex/bty.pdf

  # On a green main build, tag a new version so the publish jobs (which run on
  # the tag) fire. Gated on the full suite via `needs`, so a red main (including
  # a failing test-pxe) never gets tagged. The tag is pushed with RELEASE_PAT
  # because a GITHUB_TOKEN push would not trigger this workflow.
  tag-release:
    needs: [lint, test, flash-integration, build-wheel, build-ipxe, build-media, build-usb-x86, test-pxe, test-usb-grow, test-usb-ventoy, docs]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
      - name: Tag the version if it is new
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          test -n "$version" || { echo "could not read version from pyproject.toml"; exit 1; }
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; nothing to do."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"
          echo "Tagged ${tag}; ci-cd.yml will publish it."

  # ---------------- ship ---------------------------------------------------
  attach-to-release:
    name: Attach artifacts to GitHub release
    needs: [build-wheel, build-ipxe, build-media, build-usb-x86, test-pxe, test-usb-grow, test-usb-ventoy, docs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release creates / updates the release.
      contents: write
    steps:
      - name: Download release artifacts
        # Explicit allow-list: only the artifacts that belong on the
        # GitHub Release page. Skip ``docs-html`` (hundreds of files,
        # served by Pages instead) and skip the on-failure-only
        # ``pxe-chain-test-*`` debugging artifacts.
        uses: actions/download-artifact@v8
        with:
          path: gathered/
          pattern: '{dist,bty-ipxe-x86_64,bty-netboot-x86_64,bty-usb-x86_64-iso,docs-pdf}'
      - name: List gathered artifacts
        run: find gathered -type f | sort
      - name: Generate release.toml manifest
        # A TOML sidecar listing every shipped artifact with its size +
        # sha256. ``releases/latest/download/release.toml`` is a stable
        # URL (GitHub redirects) that scripts can curl to find the
        # current version + artifact filenames -- since the filenames
        # themselves now carry the version (``...-v0.25.5.iso``), this
        # is the replacement for the old ``latest/download/<fixed-name>``
        # pattern. Emitted before ``Attach to release`` so the action
        # uploads it alongside the artifacts in one go.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import hashlib, pathlib, os
          from datetime import datetime, UTC

          tag = os.environ["TAG"]
          version = tag.lstrip("v")
          out = pathlib.Path("release.toml")

          rows = []
          for f in sorted(pathlib.Path("gathered").rglob("*")):
              if not f.is_file():
                  continue
              if f.name.endswith(".sha256"):
                  continue  # the sha is folded into the entry below
              data = f.read_bytes()
              sha = hashlib.sha256(data).hexdigest()
              rows.append((f.name, f.stat().st_size, sha))

          lines = [
              f'version = "{version}"',
              f'tag = "{tag}"',
              f'released = "{datetime.now(UTC).strftime("%Y-%m-%dT%H:%M:%SZ")}"',
              "",
              "# Every release asset's filename, byte size, and content sha256.",
              "# Scripts looking for \"the current bty release\" can curl",
              "# https://github.com/safl/bty/releases/latest/download/release.toml",
              "# (GitHub redirects to the newest tag), parse this file, and",
              "# build the download URL for whichever artifact they need.",
          ]
          for name, size, sha in rows:
              lines += [
                  "",
                  "[[artifacts]]",
                  f'name = "{name}"',
                  f"size = {size}",
                  f'sha256 = "{sha}"',
              ]
          out.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(out.read_text())
          PY
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Each upload-artifact job lands its files in
          # ``gathered/<artifact-name>/...``. Listed explicitly so a
          # new artifact added by a future job doesn't silently leak
          # onto the public Release page. v0.46 dropped the bty-side
          # ``catalog.toml`` mirror; bty-web pulls the catalog from
          # the upstream image-builder (``safl/nosi``) directly.
          files: |
            gathered/dist/*
            gathered/bty-ipxe-x86_64/*
            gathered/bty-usb-x86_64-iso/*
            gathered/bty-netboot-x86_64/*
            gathered/docs-pdf/*
            release.toml
          fail_on_unmatched_files: true
          # Auto-populate the release body with a list of merged
          # commits / PRs since the previous tag. Without this the
          # GitHub Releases page has empty bodies; readers had to
          # ``git log v0.5.14..v0.5.15`` to see what changed.
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    # Strictly last: every prior job (test, build-wheel, build-media,
    # test-pxe, docs, attach-to-release) must have succeeded. PyPI is
    # for life - a published version cannot be re-uploaded - so we
    # only ship there after the whole release-page has gone up
    # cleanly. The ``docs`` job is part of this chain so a broken
    # PDF build (e.g. a stray non-ASCII char that pdflatex chokes
    # on) doesn't ship a wheel that won't have docs alongside.
    needs: [attach-to-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bty-lab
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent on retries - if the version is already on PyPI
          # (e.g. a previous half-failed run uploaded the wheel and a
          # later job is retrying), succeed silently rather than fail.
          skip-existing: true

  publish-docker:
    name: Publish bty-web container to ghcr.io
    # Runs in parallel with ``publish-pypi`` after the GitHub release
    # is up. Doesn't depend on PyPI: the image bundles the wheel
    # built in the ``build-wheel`` job, not a PyPI download. If PyPI
    # publication fails, we still want the container published so
    # operators can pull a working trial image from ghcr.io.
    needs: [attach-to-release, build-ipxe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # Required for ghcr.io push via $GITHUB_TOKEN.
      packages: write
      contents: read
    env:
      # ``docker/build-push-action@v6`` uploads a build-record
      # artifact named ``<owner>-<repo>-*.dockerbuild`` after every
      # build (BuildKit history; replayable via ``docker buildx
      # history import``). The default-on behaviour bakes the repo
      # owner into the artifact list on every release run. Disable
      # the upload; the in-Actions build summary (rendered on the
      # job's Summary tab) is unaffected.
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Stage custom iPXE into the build context
        # bty-web bakes it under docker/seed/ and seeds /boot from it on
        # startup for UEFI HTTP-Boot. amd64 only; arm64 falls back to the
        # absent-seed no-op (operator can drop a custom binary in /boot).
        uses: actions/download-artifact@v8
        with:
          name: bty-ipxe-x86_64
          path: docker/seed/
      - name: Normalise iPXE filename for seeding
        run: mv docker/seed/bty-ipxe-x86_64-v*.efi docker/seed/ipxe.efi
      - uses: docker/setup-qemu-action@v3
        # arm64 builds run via QEMU on the amd64 GHA runner.
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          # Multi-arch: same wheel works on amd64 and arm64 since
          # bty-lab is pure Python; only the apt-installed system
          # deps (libpam, qemu-utils, tini) differ per arch.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/safl/bty-web:${{ steps.version.outputs.version }}
            ghcr.io/safl/bty-web:latest
          # Stamp the OCI image-version label so ``docker inspect``
          # reports the bty-lab version the image was built from
          # (matches the wheel installed inside).
          build-args: |
            BTY_VERSION=${{ steps.version.outputs.version }}
          # Cache layers across runs so subsequent tags only rebuild
          # what changed (typically just the wheel install layer).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-tftp:
    name: Publish bty-tftp container to ghcr.io
    # The TFTP sidecar is debian + ipxe serving the ~1 MB NBP for BIOS/UEFI
    # PXE bootstrap (deploy/tftp). It bakes bty's custom embedded-chain
    # ipxe.efi over the stock one, so it needs the build-ipxe artifact.
    needs: [test, build-ipxe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - uses: actions/checkout@v6
      - name: Stage custom iPXE into the build context
        # Overrides the stock ipxe.efi the Containerfile installs. amd64
        # only; the arm64 image keeps stock (documented chain-loop caveat).
        uses: actions/download-artifact@v8
        with:
          name: bty-ipxe-x86_64
          path: deploy/tftp/seed/
      - name: Normalise iPXE filename for seeding
        run: mv deploy/tftp/seed/bty-ipxe-x86_64-v*.efi deploy/tftp/seed/ipxe.efi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: deploy/tftp
          file: deploy/tftp/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/safl/bty-tftp:${{ steps.version.outputs.version }}
            ghcr.io/safl/bty-tftp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

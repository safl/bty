name: Media

# bty-media image builds. Driven manually for now: the builds are
# heavy (Debian cloud image bake for usb / server, debootstrap +
# squashfs + initramfs for live) and produce artifacts on the order
# of 100 MB to 1 GB. Trigger via workflow_dispatch for one variant or
# on a media-* tag to build every supported variant in parallel.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Image variant"
        required: true
        type: choice
        default: "usb"
        options:
          - usb
          - server
          - live
  push:
    tags: ["media-*"]

jobs:
  # On workflow_dispatch the operator picks one variant; on a media-*
  # tag every supported variant is built in parallel. The disk-image
  # variants (usb, server) and the live variant share scripts/ but
  # use different cijoe pipelines (build.yaml vs live.yaml); the
  # Makefile's TASK selector picks the right one.
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # ``softprops/action-gh-release`` (live + media-* tag only) needs
    # contents:write to create / update the release. Workflow-default
    # permissions are read-only; the explicit grant keeps the rest of
    # the steps untouched.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch -> one variant (operator's choice).
        # media-* tag       -> build every supported variant.
        variant: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.variant) || '["usb","server","live"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (disk-image variants)
        if: matrix.variant != 'live'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            zstd \
            cpu-checker

      - name: Install build dependencies (live variant)
        if: matrix.variant == 'live'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso

      - name: Verify KVM availability
        if: matrix.variant != 'live'
        run: |
          sudo kvm-ok || true
          ls -l /dev/kvm || true

      - name: Install cijoe
        run: pipx install cijoe

      # The server variant builds a bty-lab wheel via ``uv build`` in
      # the bty_wheel_stage step. The usb / live variants don't need
      # uv but the install is cheap and keeps the matrix uniform.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build image
        working-directory: bty-media
        run: make build VARIANT=${{ matrix.variant }}

      - name: Upload artifact (disk-image variants)
        if: matrix.variant != 'live'
        uses: actions/upload-artifact@v7
        with:
          name: bty-${{ matrix.variant }}-x86_64-img-zst
          path: |
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst.sha256

      - name: Upload artifact (live variant)
        if: matrix.variant == 'live'
        uses: actions/upload-artifact@v7
        with:
          name: bty-live-x86_64-netboot
          path: |
            ~/system_imaging/disk/bty-live-x86_64.vmlinuz
            ~/system_imaging/disk/bty-live-x86_64.initrd
            ~/system_imaging/disk/bty-live-x86_64.squashfs
            ~/system_imaging/disk/bty-live-x86_64.sha256

      # On a media-* tag, attach the live artifacts to a GitHub
      # release so bty-web's "fetch latest release" UI can pull them
      # at the predictable /releases/latest/download/<asset> URL.
      # The disk-image variants stay as workflow artifacts only —
      # they're too large for releases (~500 MB compressed each).
      - name: Attach live artifacts to GitHub release
        if: matrix.variant == 'live' && startsWith(github.ref, 'refs/tags/media-')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ~/system_imaging/disk/bty-live-x86_64.vmlinuz
            ~/system_imaging/disk/bty-live-x86_64.initrd
            ~/system_imaging/disk/bty-live-x86_64.squashfs
            ~/system_imaging/disk/bty-live-x86_64.sha256
          fail_on_unmatched_files: true

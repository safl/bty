name: Media

# bty-media image builds. Driven manually for now: the build is heavy
# (downloads the Debian cloud image, runs cloud-init in QEMU, compacts
# and zstd-compresses) and produces an artifact on the order of ~1 GB
# compressed. We trigger via workflow_dispatch when an operator wants a
# fresh image, and on tag for releases (where every variant is built).

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Image variant"
        required: true
        type: choice
        default: "usb"
        options:
          - usb
          - server
  push:
    tags: ["media-*"]

jobs:
  # On workflow_dispatch the operator picks one variant; on a media-*
  # tag we build every supported variant. Building both in a single
  # matrix job keeps the YAML compact while letting GitHub schedule
  # them in parallel.
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch -> one variant (operator's choice).
        # media-* tag       -> build every supported variant.
        variant: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.variant) || '["usb","server"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            zstd \
            cpu-checker

      - name: Verify KVM availability
        run: |
          sudo kvm-ok || true
          ls -l /dev/kvm || true

      - name: Install cijoe
        run: pipx install cijoe

      - name: Build image
        working-directory: bty-media
        run: cijoe tasks/build.yaml --monitor -c configs/${{ matrix.variant }}.toml

      - name: Upload .img.zst artifact
        uses: actions/upload-artifact@v7
        with:
          name: bty-${{ matrix.variant }}-x86_64-img-zst
          path: |
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst.sha256

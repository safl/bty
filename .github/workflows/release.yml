name: Release

# Single unified release. Pushing a ``v*`` tag runs:
#   1. ``test``                   - lint + typecheck + pytest matrix.
#   2. ``build-wheel`` (gated)    - uv build of the bty-lab wheel + sdist.
#   3. ``build-media`` (gated)    - all three bty-media variants in
#                                   parallel (usb, server, live).
#   4. ``test-pxe`` (gated)       - server + client QEMU VMs;
#                                   end-to-end PXE chain test
#                                   against the freshly-built
#                                   server image + live trio.
#   5. ``docs`` (gated)           - HTML + PDF build. Part of the
#                                   release chain so a broken PDF
#                                   (e.g. an unsupported MyST
#                                   directive or a non-ASCII char
#                                   that pdflatex won't render)
#                                   blocks the publish - docs.yml
#                                   on its own only runs on push,
#                                   not on tag.
#   6. ``attach-to-release``      - downloads every workflow artifact
#                                   and attaches them to the GitHub
#                                   release at the same tag.
#   7. ``publish-pypi`` (last)    - trusted publishing of the wheel
#                                   + sdist. Strictly gated on every
#                                   prior job succeeding so PyPI
#                                   never sees a half-baked release
#                                   (PyPI is for life: a published
#                                   version cannot be re-uploaded).
#
# ``workflow_dispatch`` runs ``test`` + ``build-wheel`` only - smoke
# test of the package side. Ad-hoc media builds happen locally via
# the top-level Makefile (``make build VARIANT=usb-x86|server-x86|live-x86``).
#
# First publish (claiming the bty-lab name) requires a one-time PyPI
# setup: register a Pending Publisher on https://pypi.org targeting:
#   PyPI Project Name:  bty-lab
#   Owner:              safl
#   Repository:         bty
#   Workflow filename:  release.yml
#   Environment name:   pypi
# Then push a ``v*`` tag (e.g. ``v0.1.0``) and this workflow claims
# and uploads the release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ---------------- gating -------------------------------------------------
  test:
    name: Test (lint + typecheck + pytest ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --group dev
      # Mirror what ci.yml runs on every push - lint + format + types
      # + tests. We duplicate the steps inline rather than route
      # through ``workflow_run`` so the gating dependency graph is
      # explicit in this one file.
      - run: uv run ruff check
      - run: uv run ruff format --check
      # mypy is single-version; only run it on the 3.12 matrix slot
      # to avoid duplicating across the matrix.
      - if: matrix.python == '3.12'
        run: uv run mypy src
      - run: uv run pytest

  # ---------------- build --------------------------------------------------
  build-wheel:
    name: Build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-media:
    name: Build ${{ matrix.variant }} image
    needs: test
    # Tag-only - workflow_dispatch builds the wheel only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # ``experimental`` matrix entries don't fail the workflow when
    # they fail; promoted to required once they go green on a real
    # tag run. M19 phase 1 introduces ``usb-iso`` as experimental.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        # ``variant`` is the user-facing name (``make build VARIANT=...``);
        # ``role`` is the arch-stripped role used to derive image config
        # keys and artifact filenames; ``kind`` selects the right deps and
        # upload step.
        include:
          - variant: usb-x86
            role: usb
            kind: disk
          - variant: server-x86
            role: server
            kind: disk
          - variant: live-x86
            role: live
            kind: live
          - variant: server-rpi
            role: server-rpi
            kind: disk-rpi
          # M19 phase 1: USB image rebuilt as a hybrid ISO via
          # live-build. Coexists with the legacy ``usb-x86`` cloud-init
          # bake; experimental until proven on real hardware, then
          # phase 5 retires the cloud-init path and frees the
          # ``usb-x86`` variant name.
          - variant: usb-iso
            role: usb-iso
            kind: live
            experimental: true
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (disk-image variants)
        if: matrix.kind == 'disk'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            zstd \
            cpu-checker

      - name: Install build dependencies (server-rpi variant)
        # Cross-arch image customisation: download Pi OS Lite arm64,
        # losetup-mount, chroot in via qemu-aarch64-static (binfmt-support
        # auto-registers the handler on install). xz-utils for the
        # upstream image's .xz; parted/e2fsprogs to grow the rootfs
        # partition; zstd for the final ``.img.zst``.
        if: matrix.kind == 'disk-rpi'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static \
            binfmt-support \
            xz-utils \
            zstd \
            parted \
            e2fsprogs
          # Sanity: verify binfmt registered the aarch64 handler.
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64 || \
            (echo "binfmt_misc qemu-aarch64 not registered" >&2; exit 1)

      - name: Install build dependencies (live variant)
        # Ubuntu's ``live-build`` package (20230502 on Noble) still
        # fetches ``dists/<release>/Contents-<arch>.gz`` to resolve
        # which package provides the kernel image - but Debian moved
        # Contents-*.gz under ``main/`` (per-component) for every
        # active release, so the top-level URL 404s and the build
        # aborts. Debian's pool ships a newer live-build (20240208+)
        # with the fixed URL handling. Grab the latest .deb straight
        # from the pool via wget + dpkg - skips the apt + GPG dance
        # since live-build is Architecture: all (shell + perl, no
        # libc dep) and a one-shot cross-distro install is safe.
        if: matrix.kind == 'live'
        run: |
          set -eu
          sudo apt-get update
          # ``debootstrap squashfs-tools xorriso debian-archive-keyring``
          # are live-build's required deps. ``gdisk`` (sgdisk) and
          # ``exfatprogs`` (mkfs.exfat) are needed by the usb-iso
          # variant's post-build step that appends a writable BTY_IMAGES
          # partition to the cooked hybrid ISO; harmless on the
          # live-x86 build that doesn't run that step.
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso debian-archive-keyring \
            gdisk exfatprogs
          POOL=http://ftp.debian.org/debian/pool/main/l/live-build
          LB_DEB=$(curl -s "$POOL/" \
              | grep -oE 'live-build_[0-9][^"<]*\.deb' \
              | sort -V | tail -1)
          if [ -z "$LB_DEB" ]; then
              echo "could not find live-build .deb in $POOL/" >&2
              exit 1
          fi
          echo "Fetching $LB_DEB"
          wget -q "$POOL/$LB_DEB"
          sudo dpkg -i "$LB_DEB"
          lb --version

      - name: Enable KVM access for the runner
        # GHA's hosted Linux runners ship /dev/kvm but the runner user
        # isn't in the kvm group, so QEMU's ``-accel kvm`` fails with
        # "Permission denied". Drop a udev rule that makes the device
        # world-accessible (mode 0666). Standard pattern for hosted
        # runners; without it the cloud-init bake hits a permission
        # error on the first qemu-system-x86_64 invocation.
        if: matrix.kind == 'disk'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo kvm-ok || true
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build image
        run: make build VARIANT=${{ matrix.variant }}

      - name: Upload artifact (disk-image variants)
        if: matrix.kind == 'disk'
        uses: actions/upload-artifact@v7
        with:
          name: bty-${{ matrix.role }}-x86_64-img-zst
          path: |
            ~/system_imaging/disk/bty-${{ matrix.role }}-x86_64.img.zst
            ~/system_imaging/disk/bty-${{ matrix.role }}-x86_64.img.zst.sha256

      - name: Upload artifact (server-rpi variant)
        if: matrix.kind == 'disk-rpi'
        uses: actions/upload-artifact@v7
        with:
          name: bty-server-rpi-arm64-img-zst
          path: |
            ~/system_imaging/disk/bty-server-rpi-arm64.img.zst
            ~/system_imaging/disk/bty-server-rpi-arm64.img.zst.sha256

      - name: Upload artifact (live variant)
        if: matrix.variant == 'live-x86'
        uses: actions/upload-artifact@v7
        with:
          name: bty-live-x86_64-netboot
          path: |
            ~/system_imaging/disk/bty-live-x86_64.vmlinuz
            ~/system_imaging/disk/bty-live-x86_64.initrd
            ~/system_imaging/disk/bty-live-x86_64.squashfs
            ~/system_imaging/disk/bty-live-x86_64.sha256

      - name: Upload artifact (usb-iso variant)
        if: matrix.variant == 'usb-iso'
        uses: actions/upload-artifact@v7
        with:
          name: bty-usb-x86_64-iso
          path: |
            ~/system_imaging/disk/bty-usb-x86_64.iso
            ~/system_imaging/disk/bty-usb-x86_64-iso.sha256

  # ---------------- verify ------------------------------------------------
  test-pxe:
    name: PXE chain test (server + client QEMU VMs)
    needs: build-media
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools (qemu, zstd)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            zstd \
            cpu-checker

      - name: Enable KVM access for the runner
        # The chain test boots two QEMU VMs that need /dev/kvm. Same
        # udev workaround as the build-media job.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install --force cijoe

      - name: Download server image artefact
        uses: actions/download-artifact@v8
        with:
          name: bty-server-x86_64-img-zst
          path: ~/system_imaging/disk/

      - name: Download live artefacts
        uses: actions/download-artifact@v8
        with:
          name: bty-live-x86_64-netboot
          path: ~/system_imaging/disk/

      # The cijoe ``pxe_customize_server`` step rehydrates
      # ``bty-server-x86_64.qcow2`` from the .img.zst on its own
      # when the qcow2 is missing, so no separate decompress step is
      # needed here - same code path as a local ``make test-pxe``.
      - name: Run PXE chain test
        run: make test-pxe

      - name: Upload cijoe report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-cijoe-output
          path: cijoe/cijoe-output/
          if-no-files-found: warn

      - name: Upload test workspace on failure (qcow2, serial logs)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-workspace
          path: cijoe/_build/test-pxe/
          if-no-files-found: warn

  # ---------------- docs (gates the release) -------------------------------
  docs:
    name: Build docs (HTML + PDF)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      # Same package set as docs.yml's standalone build, so a tag
      # push exercises identical machinery to a main-push docs run.
      - name: Install LaTeX (for PDF build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre \
            fonts-freefont-otf \
            latexmk \
            make
      - name: Install docs tooling
        run: uv tool install ./docs/tooling
      - name: Build HTML
        working-directory: docs
        run: bty-docs-build-html
      - name: Build PDF
        working-directory: docs
        run: bty-docs-build-pdf
      - uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
      - uses: actions/upload-artifact@v7
        with:
          name: docs-pdf
          path: docs/_build/latex/bty.pdf

  # ---------------- ship ---------------------------------------------------
  attach-to-release:
    name: Attach artifacts to GitHub release
    needs: [build-wheel, build-media, test-pxe, docs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release creates / updates the release.
      contents: write
    steps:
      - name: Download release artifacts
        # Explicit allow-list: only the artifacts that belong on the
        # GitHub Release page. Skip ``docs-html`` (hundreds of files,
        # served by Pages instead) and skip the on-failure-only
        # ``pxe-chain-test-*`` debugging artifacts.
        uses: actions/download-artifact@v8
        with:
          path: gathered/
          pattern: '{dist,bty-*-img-zst,bty-live-x86_64-netboot,bty-usb-x86_64-iso,docs-pdf}'
      - name: List gathered artifacts
        run: find gathered -type f | sort
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Each upload-artifact job lands its files in
          # ``gathered/<artifact-name>/...``. Listed explicitly so a
          # new artifact added by a future job doesn't silently leak
          # onto the public Release page.
          # Note: ``bty-usb-x86_64-iso`` (M19 phase 1) is downloaded
          # via the pattern above so it is available locally for
          # inspection, but is intentionally NOT listed here while
          # the build is experimental (``continue-on-error: true``).
          # Adding it would make ``fail_on_unmatched_files`` block the
          # whole release whenever the experimental build fails.
          # Promote to this list when usb-iso has gone green on a
          # real tag run (M19 phase 5 cleanup).
          files: |
            gathered/dist/*
            gathered/bty-usb-x86_64-img-zst/*
            gathered/bty-server-x86_64-img-zst/*
            gathered/bty-server-rpi-arm64-img-zst/*
            gathered/bty-live-x86_64-netboot/*
            gathered/docs-pdf/*
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    # Strictly last: every prior job (test, build-wheel, build-media,
    # test-pxe, docs, attach-to-release) must have succeeded. PyPI is
    # for life - a published version cannot be re-uploaded - so we
    # only ship there after the whole release-page has gone up
    # cleanly. The ``docs`` job is part of this chain so a broken
    # PDF build (e.g. a stray non-ASCII char that pdflatex chokes
    # on) doesn't ship a wheel that won't have docs alongside.
    needs: [attach-to-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bty-lab
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent on retries - if the version is already on PyPI
          # (e.g. a previous half-failed run uploaded the wheel and a
          # later job is retrying), succeed silently rather than fail.
          skip-existing: true

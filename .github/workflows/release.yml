name: Release

# Publishes ``bty-lab`` to PyPI on ``v*`` tag pushes via PyPA Trusted
# Publishing. No long-lived API tokens — the publish job authenticates
# to PyPI with an OIDC token GitHub mints for this workflow + this
# environment.
#
# First publish (claiming the bty-lab name) requires a one-time PyPI
# setup: register a Pending Publisher on https://pypi.org targeting:
#   PyPI Project Name:  bty-lab
#   Owner:              safl
#   Repository:         bty
#   Workflow filename:  release.yml
#   Environment name:   pypi
# Then push a ``v*`` tag (e.g. ``v0.1.0``) and this workflow
# claims and uploads the release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Tag-driven runs only; workflow_dispatch builds but does not publish.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bty-lab
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

name: Release

# Single unified release. Pushing a ``v*`` tag runs:
#   1. ``test``                   - lint + typecheck + pytest matrix.
#   2. ``build-wheel`` (gated)    - uv build of the bty-lab wheel + sdist.
#   3. ``build-media`` (gated)    - all three bty-media variants in
#                                   parallel (usb, server, live).
#   4. ``test-pxe`` (gated)       - server + client QEMU VMs;
#                                   end-to-end PXE chain test
#                                   against the freshly-built
#                                   server image + live trio.
#   5. ``attach-to-release``      - downloads every workflow artifact
#                                   and attaches them to the GitHub
#                                   release at the same tag.
#   6. ``publish-pypi`` (last)    - trusted publishing of the wheel
#                                   + sdist. Strictly gated on every
#                                   prior job succeeding so PyPI
#                                   never sees a half-baked release
#                                   (PyPI is for life: a published
#                                   version cannot be re-uploaded).
#
# ``workflow_dispatch`` runs ``test`` + ``build-wheel`` only - smoke
# test of the package side. Ad-hoc media builds happen locally via
# the top-level Makefile (``make build VARIANT=usb|server|live``).
#
# First publish (claiming the bty-lab name) requires a one-time PyPI
# setup: register a Pending Publisher on https://pypi.org targeting:
#   PyPI Project Name:  bty-lab
#   Owner:              safl
#   Repository:         bty
#   Workflow filename:  release.yml
#   Environment name:   pypi
# Then push a ``v*`` tag (e.g. ``v0.1.0``) and this workflow claims
# and uploads the release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ---------------- gating -------------------------------------------------
  test:
    name: Test (lint + typecheck + pytest ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --group dev
      # Mirror what ci.yml runs on every push - lint + format + types
      # + tests. We duplicate the steps inline rather than route
      # through ``workflow_run`` so the gating dependency graph is
      # explicit in this one file.
      - run: uv run ruff check
      - run: uv run ruff format --check
      # mypy is single-version; only run it on the 3.12 matrix slot
      # to avoid duplicating across the matrix.
      - if: matrix.python == '3.12'
        run: uv run mypy src
      - run: uv run pytest

  # ---------------- build --------------------------------------------------
  build-wheel:
    name: Build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-media:
    name: Build ${{ matrix.variant }} image
    needs: test
    # Tag-only - workflow_dispatch builds the wheel only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        variant: [usb, server, live]
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (disk-image variants)
        if: matrix.variant != 'live'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            zstd \
            cpu-checker

      - name: Install build dependencies (live variant)
        # Ubuntu's ``live-build`` package (20230502 on Noble) still
        # fetches ``dists/<release>/Contents-<arch>.gz`` to resolve
        # which package provides the kernel image - but Debian moved
        # Contents-*.gz under ``main/`` (per-component) for every
        # active release, so the top-level URL 404s and the build
        # aborts. Debian's pool ships a newer live-build (20240208+)
        # with the fixed URL handling. Grab the latest .deb straight
        # from the pool via wget + dpkg - skips the apt + GPG dance
        # since live-build is Architecture: all (shell + perl, no
        # libc dep) and a one-shot cross-distro install is safe.
        if: matrix.variant == 'live'
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso debian-archive-keyring
          POOL=http://ftp.debian.org/debian/pool/main/l/live-build
          LB_DEB=$(curl -s "$POOL/" \
              | grep -oE 'live-build_[0-9][^"<]*\.deb' \
              | sort -V | tail -1)
          if [ -z "$LB_DEB" ]; then
              echo "could not find live-build .deb in $POOL/" >&2
              exit 1
          fi
          echo "Fetching $LB_DEB"
          wget -q "$POOL/$LB_DEB"
          sudo dpkg -i "$LB_DEB"
          lb --version

      - name: Enable KVM access for the runner
        # GHA's hosted Linux runners ship /dev/kvm but the runner user
        # isn't in the kvm group, so QEMU's ``-accel kvm`` fails with
        # "Permission denied". Drop a udev rule that makes the device
        # world-accessible (mode 0666). Standard pattern for hosted
        # runners; without it the cloud-init bake hits a permission
        # error on the first qemu-system-x86_64 invocation.
        if: matrix.variant != 'live'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo kvm-ok || true
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install cijoe

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build image
        run: make build VARIANT=${{ matrix.variant }}

      - name: Upload artifact (disk-image variants)
        if: matrix.variant != 'live'
        uses: actions/upload-artifact@v7
        with:
          name: bty-${{ matrix.variant }}-x86_64-img-zst
          path: |
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst
            ~/system_imaging/disk/bty-${{ matrix.variant }}-x86_64.img.zst.sha256

      - name: Upload artifact (live variant)
        if: matrix.variant == 'live'
        uses: actions/upload-artifact@v7
        with:
          name: bty-live-x86_64-netboot
          path: |
            ~/system_imaging/disk/bty-live-x86_64.vmlinuz
            ~/system_imaging/disk/bty-live-x86_64.initrd
            ~/system_imaging/disk/bty-live-x86_64.squashfs
            ~/system_imaging/disk/bty-live-x86_64.sha256

  # ---------------- verify ------------------------------------------------
  test-pxe:
    name: PXE chain test (server + client QEMU VMs)
    needs: build-media
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools (qemu, zstd, genisoimage)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            zstd \
            cpu-checker \
            genisoimage

      - name: Enable KVM access for the runner
        # The chain test boots two QEMU VMs that need /dev/kvm. Same
        # udev workaround as the build-media job.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install cijoe
        run: pipx install cijoe

      - name: Download server image artefact
        uses: actions/download-artifact@v8
        with:
          name: bty-server-x86_64-img-zst
          path: ~/system_imaging/disk/

      - name: Download live artefacts
        uses: actions/download-artifact@v8
        with:
          name: bty-live-x86_64-netboot
          path: ~/system_imaging/disk/

      # The cijoe ``pxe_customize_server`` step rehydrates
      # ``bty-server-x86_64.qcow2`` from the .img.zst on its own
      # when the qcow2 is missing, so no separate decompress step is
      # needed here - same code path as a local ``make test-pxe``.
      - name: Run PXE chain test
        run: make test-pxe

      - name: Upload cijoe report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-cijoe-output
          path: cijoe/cijoe-output/
          if-no-files-found: warn

      - name: Upload test workspace on failure (qcow2, serial logs)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pxe-chain-test-workspace
          path: cijoe/_build/test-pxe/
          if-no-files-found: warn

  # ---------------- ship ---------------------------------------------------
  attach-to-release:
    name: Attach artifacts to GitHub release
    needs: [build-wheel, build-media, test-pxe]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release creates / updates the release.
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: gathered/
      - name: List gathered artifacts
        run: find gathered -type f | sort
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Each upload-artifact job lands its files in
          # ``gathered/<artifact-name>/...``; the recursive glob
          # picks them all up.
          files: gathered/**/*
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    # Strictly last: every prior job (test, build-wheel, build-media,
    # attach-to-release) must have succeeded. PyPI is for life - a
    # published version cannot be re-uploaded - so we only ship there
    # after the whole release-page has gone up cleanly.
    needs: [attach-to-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bty-lab
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent on retries - if the version is already on PyPI
          # (e.g. a previous half-failed run uploaded the wheel and a
          # later job is retrying), succeed silently rather than fail.
          skip-existing: true

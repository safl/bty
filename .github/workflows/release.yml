name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # PyPI publishing is a follow-up: enable trusted publishing on PyPI,
  # then add a publish job that uses pypa/gh-action-pypi-publish.

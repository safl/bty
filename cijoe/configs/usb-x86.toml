# bty USB live appliance - build configuration
#
# Drives Debian's live-build to produce a hybrid ISO that boots both
# from CD media and from a USB stick (BIOS + UEFI). The ISO ships
# zstd-compressed (``bty-usb-x86_64.iso.zst``) because the raw
# artifact - including the trailing 4 GiB BTY_IMAGES exFAT
# partition - exceeds GitHub's 2 GiB per-release-asset upload limit.
# Operators decompress + dd in one pipe:
#
#     zstd -d --stdout bty-usb-x86_64.iso.zst | sudo dd of=/dev/sdX bs=4M
#
# or unpack to a file first and use Balena Etcher / Rufus, or drop
# the unpacked .iso onto a Ventoy stick alongside other rescue ISOs.
#
# This is the M19 live-build replacement for the previous cloud-init
# bake; phase 6 retired the cloud-init path and the ``usb-x86``
# variant name moved here.
#
# Usage:
#   cijoe tasks/usb.yaml --config configs/usb-x86.toml --monitor
# (or via the Makefile dispatcher: ``make build VARIANT=usb-x86``)

[bty]
variant = "usb-x86"
hostname = "bty-usb"
timezone = "UTC"

[cijoe.workflow]
fail_fast = true

# Where the published artifact lands. Mirrors the netboot-x86 /
# server-x86 variants' default so all images live under one tree.
[system-imaging.images.bty-usb-x86_64-iso]
publish.dir = "{{ local.env.HOME }}/system_imaging/disk"

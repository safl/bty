# bty USB live appliance - build configuration
#
# Drives Debian's live-build to produce a hybrid ISO that boots both
# from CD media and from a USB stick (BIOS + UEFI). The ISO ships
# gzip-compressed (``bty-usb-x86_64.iso.gz``) because the raw
# artifact - including the trailing 4 GiB BTY_IMAGES exFAT
# partition - exceeds GitHub's 2 GiB per-release-asset upload limit.
# Operators on a GUI flasher (Balena Etcher / Raspberry Pi Imager /
# Rufus DD-mode) open the .iso.gz directly: those tools decompress
# .gz natively, no extra step needed. CLI:
#
#     gunzip -d --stdout bty-usb-x86_64.iso.gz | sudo dd of=/dev/sdX bs=4M
#
# Decompress to .iso first (``gunzip bty-usb-x86_64.iso.gz``) before
# dropping onto a Ventoy stick; Ventoy doesn't auto-decompress.
#
# This is the live-build replacement for an earlier cloud-init bake
# of the ``usb-x86`` variant; the cloud-init path was retired in
# favour of live-build's iso-hybrid output.
#
# Usage:
#   cijoe tasks/usb.yaml --config configs/usb-x86.toml --monitor
# (or via the Makefile dispatcher: ``make build VARIANT=usb-x86``)

[bty]
variant = "usb-x86"
hostname = "bty-usb"
timezone = "UTC"

[cijoe.workflow]
fail_fast = true

# Where the published artifact lands. Mirrors the netboot-x86 /
# server-x86 variants' default so all images live under one tree.
[system-imaging.images.bty-usb-x86_64-iso]
publish.dir = "{{ local.env.HOME }}/system_imaging/disk"

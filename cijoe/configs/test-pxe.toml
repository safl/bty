# bty PXE chain test: containerized bty-web + a bridged QEMU client.
#
# Usage:
#   cijoe tasks/test-pxe.yaml --monitor -c configs/test-pxe.toml
#
# Pre-conditions:
# - bty-netboot-x86_64.{vmlinuz,initrd,squashfs} pre-built under
#   ``~/system_imaging/disk/`` (run ``make build VARIANT=netboot-x86`` first).
# - podman, qemu-system-x86_64, dnsmasq, ipxe (NBPs), iproute2 on PATH.
# - passwordless sudo (the test creates a bridge/tap + runs dnsmasq).
# - KVM accessible.

[bty]
variant = "test-pxe"

[cijoe.workflow]
fail_fast = true

[test.pxe]
# Pre-built netboot artifacts live here; ``make build VARIANT=...`` populates it.
artifact_dir = "{{ local.env.HOME }}/system_imaging/disk"

# bty-web container image tag (built by pxe_prepare from this checkout).
bty_image = "bty-web:pxetest"

# Admin password set on the container; the chain step logs in with it.
bty_password = "test-admin-pw"

# Dummy image name uploaded via PUT /images/<name> and bound to the client MAC.
machine_image = "test.qcow2"

# Client VM firmware: "bios" (SeaBIOS + NIC option ROM) or "uefi" (OVMF).
client_firmware = "bios"
client_mac = "52:54:00:11:22:33"

# Host bridge for the synthetic PXE segment: bty-web (published :8080) and the
# client VM (via a tap) share L2; a test-side dnsmasq on the bridge does DHCP +
# TFTP. bty serves no DHCP; this is test machinery.
bridge = "br-pxe"
tap_iface = "tap-pxe"
server_pxe_ip = "192.168.99.1"
pxe_netmask = "255.255.255.0"
dhcp_range_lo = "192.168.99.50"
dhcp_range_hi = "192.168.99.150"

# Markers asserted on the client serial console (all must appear within the
# chain timeout). The per-MAC ``/pxe/<mac>`` marker is added by the script.
[[test.pxe.chain_markers]]
key = "ipxe-loaded"
needle = "iPXE"

[[test.pxe.chain_markers]]
key = "ipxe-fetch-bootstrap"
needle = "pxe-bootstrap.ipxe"

[[test.pxe.chain_markers]]
key = "kernel-initrd-fetched"
needle = "bty-netboot-x86_64-v"

[[test.pxe.chain_markers]]
key = "squashfs-fetched"
needle = ".squashfs"

[[test.pxe.chain_markers]]
key = "auto-flash-started"
needle = "bty: auto-flash starting"

[[test.pxe.chain_markers]]
key = "flash-complete"
needle = "bty: flash complete; rebooting"

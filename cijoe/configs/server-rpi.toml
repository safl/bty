# bty server appliance, Raspberry Pi 4/5 variant - build configuration
#
# Customises a Raspberry Pi OS Lite arm64 image into a bty-server SD-card
# image. Structurally different from the x86 server build (no QEMU
# cloud-init bake): we mount the downloaded image via losetup, chroot
# in via ``qemu-aarch64-static``, install packages, drop the bty rootfs
# overlay, enable services, then unmount and zstd-compress.
#
# Output: ``bty-server-rpi-arm64.img.zst`` (dd onto an SD card; works on
# Raspberry Pi 4 and 5).
#
# Build host requirements:
#   - amd64 Linux with ``binfmt_misc`` and ``qemu-user-static`` (so the
#     arm64 chroot runs transparently)
#   - passwordless sudo (mount/chroot need root)
#   - ``zstd``, ``losetup``, ``parted``, ``e2fsprogs``, ``xz-utils``
#
# Usage:
#   make build VARIANT=server-rpi
# (or, directly: cijoe tasks/build-rpi.yaml --config configs/server-rpi.toml)

[bty]
variant = "server-rpi"
hostname = "bty-server"
timezone = "UTC"

[cijoe.workflow]
fail_fast = true

[system-imaging.images.bty-server-rpi-arm64]
# Raspberry Pi OS Lite (64-bit), Bookworm. The "latest" alias always
# points at the most-recent stable release; pin to a dated URL if you
# need reproducibility.
source.url = "https://downloads.raspberrypi.com/raspios_lite_arm64_latest"
source.path = "{{ local.env.HOME }}/system_imaging/cloud/raspios_lite_arm64_latest.img.xz"

# Working file paths.
disk.raw_path = "{{ local.env.HOME }}/system_imaging/disk/bty-server-rpi-arm64.img"

# Image is grown to this size before customisation so the bty venv,
# dnsmasq packages, and the ipxe bits fit. Rough budget:
#   * Pi OS Lite base   ~1.5 GiB
#   * apt cache + bty   ~0.7 GiB
#   * room for overlays ~0.3 GiB
disk.target_size_gib = 4

# Final dd-able artifact: raw + zstd
publish.zst_path = "{{ local.env.HOME }}/system_imaging/disk/bty-server-rpi-arm64.img.zst"
publish.zstd_level = 19

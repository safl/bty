# bty network-flash live env - build configuration
#
# Drives Debian's live-build to produce kernel + initrd + squashfs
# artifacts that bty-server hosts over HTTP for PXE clients to chain
# into. Structurally different from the usb / server variants: no
# QEMU bake, no cloud-init, no .img.zst output.
#
# Usage:
#   cijoe tasks/live.yaml --config configs/live.toml --monitor
# (or via the Makefile dispatcher: ``make build VARIANT=live``)

[bty]
variant = "live"
hostname = "bty-live"
timezone = "UTC"

[cijoe.workflow]
fail_fast = true

# Where the published artifacts land. Mirrors the usb / server
# variants' default so all three live under one directory tree.
[system-imaging.images.bty-live-x86_64]
publish.dir = "{{ local.env.HOME }}/system_imaging/disk"

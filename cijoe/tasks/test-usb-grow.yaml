doc: |
  USB auto-grow end-to-end test
  =============================

  Verifies ``bty-usb-grow.service`` extends the BTY_IMAGES exFAT
  partition from its 32 MiB bake-time minimum to fill the
  underlying disk on first boot.

  Composed entirely of cijoe primitives -- ``qemu.guest_start``,
  ``core.wait_for_transport``, ``core.cmdrunner``,
  ``qemu.guest_wait_for_termination`` -- plus two thin host-side
  helpers (``usb_grow_stage`` to prep the disk, ``usb_grow_assert``
  to inspect it post-boot). No subprocess.Popen, no hand-rolled
  paramiko, no ``_ssh_ready`` polling -- if the test fails the
  cijoe report carries the systemctl status + journal of
  bty-usb-grow.service inside the VM, captured via the
  ``usb_grow_guest`` SSH transport.

  Run locally with the same command CI runs:

      sudo -v && make build VARIANT=usb-x86 && make test-usb-grow

  (The bake stages a fresh .iso under ~/system_imaging/disk/;
  ``usb_grow_stage`` copies + truncates it into the qemu guest
  workspace under ~/system_imaging/usb-grow/disk.img.)

steps:
- name: stage_test_disk
  uses: usb_grow_stage

- name: guest_start
  uses: qemu.guest_start
  with:
    guest_name: usb-grow

- name: wait_for_guest_ssh
  uses: core.wait_for_transport
  with:
    state: up
    transport_name: usb_grow_guest
    timeout: 240

- name: probe_in_vm_diagnostics
  uses: core.cmdrunner
  with:
    transport: usb_grow_guest
    commands:
    - "lsblk -f /dev/sda"
    - "ls -la /dev/disk/by-label/ 2>&1 || true"
    - "blkid"
    - "systemctl status bty-usb-grow.service --no-pager --full || true"
    - "journalctl -u bty-usb-grow.service --no-pager --no-hostname || true"
    - "cat /run/bty-usb-grow.status 2>&1 || echo NO_STATUS_FILE"
    - "parted -ms /dev/sda unit B print || true"

- name: assert_wizard_on_tty1
  uses: core.cmdrunner
  with:
    transport: usb_grow_guest
    commands:
    # CI gap exposed by a v0.30.0 operator report: nothing in CI
    # confirmed that ``bty-on-tty1.service`` actually rendered the
    # wizard on tty1. test-usb-grow only inspected the partition;
    # test-usb-ventoy bypassed the binary by importing
    # _list_local_images directly in Python. A wedge in the bty
    # entry point itself (failed Rich init, BtyTui constructor
    # crash, the wrapper exiting before exec) would have shipped to
    # PyPI undetected.
    #
    # /dev/vcs1 is the kernel's text-snapshot of tty1's framebuffer
    # contents. We grep for ``Pick an image source`` -- a string
    # that ONLY the rendered wizard produces. The pre-Rich wrapper
    # output (``bty is starting...``) deliberately doesn't match,
    # so a bty binary that prints the wrapper banner then crashes
    # before drawing fails this assertion.
    #
    # 60s budget: Rich + bty.catalog + bty.flash + bty.oras imports
    # take ~5-10s on a hot KVM guest, ~15-25s cold. The runner is
    # cold every release.
    - "systemctl is-active bty-on-tty1.service"
    - "for i in $(seq 1 60); do grep -q 'Pick an image source' /dev/vcs1 && break; sleep 1; done"
    - "cat /run/bty.status 2>&1 || echo NO_STATUS_FILE"
    - "tr -cd '[:print:]\\n' < /dev/vcs1 | head -10 || true"
    - "grep -q 'Pick an image source' /dev/vcs1"

- name: poweroff_guest
  uses: core.cmdrunner
  with:
    transport: usb_grow_guest
    commands:
    - "systemctl poweroff -i || poweroff -f"

- name: wait_for_termination
  uses: qemu.guest_wait_for_termination
  with:
    guest_name: usb-grow
    timeout: 60

- name: assert_grew
  uses: usb_grow_assert

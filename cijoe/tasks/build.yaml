doc: |
  bty appliance image build (cloud-init bake in QEMU)
  ===================================================

  Drives the cloud-init-in-QEMU pipeline used by the ``server-x86``
  variant. (``usb-x86`` previously used this path too; M19 phase 6
  retired the cloud-init bake for the USB image in favour of
  live-build.) The variant comes from the cijoe config
  (``-c configs/<variant>.toml``); the cijoe scripts strip the arch
  suffix to derive the role (``server``) used as the rootfs
  subdirectory and the cloud-init base file. The output image name
  is ``bty-<role>-x86_64.img.zst``.

  Steps:

  1. ``bty_wheel_stage`` builds the bty-lab wheel via ``uv build``
     from the parent repo and stages it under
     ``rootfs/server/opt/bty/`` so ``gen_userdata`` can inline it.
  2. ``gen_userdata`` assembles a cloud-init user-data file by
     inlining files under ``rootfs/common/`` and ``rootfs/<role>/``
     as ``write_files`` entries on top of
     ``auxiliary/cloudinit-base-<role>.user``.
  3. ``diskimage_build`` downloads the Debian cloud image, resizes
     the boot disk, builds the cloud-init seed.iso, and boots QEMU.
     cloud-init provisions the system and powers off; ``qemu-img
     convert -c`` produces a baked qcow2.
  4. ``img_zst_publish`` converts the qcow2 to raw and zstd-compresses
     it into a dd-able ``.img.zst`` artifact, alongside a sha256sum.

  ``server-rpi`` uses ``tasks/build-rpi.yaml`` instead (chroot-via-
  qemu-aarch64-static, no QEMU full-system bake). ``usb-x86`` and
  ``live-x86`` use ``tasks/usb.yaml`` / ``tasks/live.yaml``
  respectively (live-build, no QEMU full-system bake either).

steps:
- name: bty_wheel_stage
  uses: bty_wheel_stage

- name: gen_userdata
  uses: gen_userdata

- name: diskimage_build
  uses: diskimage_build

- name: img_zst_publish
  uses: img_zst_publish

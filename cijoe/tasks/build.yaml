doc: |
  bty appliance image build (cloud-init bake in QEMU)
  ===================================================

  Drives the cloud-init-in-QEMU pipeline used by the ``server-x86``
  variant. (``usb-x86`` previously used this path too; it has since
  moved to live-build.) The variant comes from the cijoe config
  (``-c configs/<variant>.toml``); the cijoe scripts strip the arch
  suffix to derive the role (``server``) used as the rootfs
  subdirectory and the cloud-init base file. The output image name
  is ``bty-<role>-x86_64.img.gz``.

  Steps:

  1. ``bty_wheel_stage`` builds the bty-lab wheel via ``uv build``
     from the parent repo and stages it under
     ``rootfs/server/opt/bty/`` so ``gen_userdata`` can inline it.
  2. ``bty_ipxe_build`` clones iPXE upstream, applies bty's slim-
     build trims + embedded chain script, and produces a custom
     ``ipxe.efi`` staged at ``rootfs/server/var/lib/tftpboot/``
     (TFTP-served) and ``rootfs/server/var/lib/bty/boot/`` (HTTP-
     Boot served). The embedded script breaks iPXE's autoboot
     loop -- stock Debian iPXE would re-fetch itself indefinitely
     since the operator's LAN DHCP returns ``filename=ipxe.efi``.
  3. ``gen_userdata`` assembles a cloud-init user-data file by
     inlining files under ``rootfs/common/`` and ``rootfs/<role>/``
     as ``write_files`` entries on top of
     ``auxiliary/cloudinit-base-<role>.user``.
  4. ``diskimage_build`` downloads the Debian cloud image, resizes
     the boot disk, builds the cloud-init seed.iso, and boots QEMU.
     cloud-init provisions the system and powers off; ``qemu-img
     convert -c`` produces a baked qcow2.
  5. ``img_gz_publish`` converts the qcow2 to raw and gzip-compresses
     it into a dd-able ``.img.gz`` artifact, alongside a sha256sum.
     Gzip rather than zstd: bty-shipped images are flashed once
     during operator setup; gzip's universal flasher / OS / tooling
     support beats zstd's marginal speed advantage. Operator-supplied
     images can still be in any of .img.{zst,xz,gz,bz2}.

  ``server-rpi`` uses ``tasks/build-rpi.yaml`` instead (chroot-via-
  qemu-aarch64-static, no QEMU full-system bake). ``usb-x86`` and
  ``netboot-x86`` use ``tasks/usb.yaml`` / ``tasks/netboot.yaml``
  respectively (live-build, no QEMU full-system bake either).

steps:
- name: bty_wheel_stage
  uses: bty_wheel_stage

- name: bty_ipxe_build
  uses: bty_ipxe_build

- name: gen_userdata
  uses: gen_userdata

- name: diskimage_build
  uses: diskimage_build

- name: img_gz_publish
  uses: img_gz_publish

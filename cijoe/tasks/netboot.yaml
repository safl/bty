doc: |
  bty network-boot live env build
  ===============================

  Builds the kernel + initrd + squashfs trio that PXE clients chain
  into via the bty server's HTTP boot stack. The chroot carries the
  bty runtime, ``bty-flash-on-boot.service`` (auto-flash mode), and
  ``bty-tui-on-tty1.service`` (interactive mode). The server's iPXE
  chain hands the live env its mode via kernel command line:
  ``bty.server=``, ``bty.mac=``, plus either ``bty.image_url=``
  (auto-flash, ``boot_policy=flash``) or ``bty.mode=interactive``
  (TUI, ``boot_policy=tui``).

  Renamed from ``tasks/live.yaml`` to ``tasks/netboot.yaml``: the
  variant moved from ``live-x86`` to ``netboot-x86`` to disambiguate
  from ``usb-x86`` (which is also a live image).

  Steps:

  1. ``bty_wheel_stage`` - builds the bty-lab wheel from the parent
     repo and stages it under
     ``live-build/config/includes.chroot/opt/bty/``. live-build's
     chroot hook installs it (with the ``[tui]`` extra) into
     ``/opt/bty/venv``.
  2. ``live_build`` - copies ``live-build/`` into a working dir,
     runs ``lb clean --all && lb build`` (debootstrap, mksquashfs,
     mkinitramfs), and publishes
     ``bty-netboot-x86_64.{vmlinuz,initrd,squashfs}`` plus a sha256
     manifest under ``publish.dir``.

  Requires: live-build on the build host (``apt install live-build``)
  plus passwordless sudo (live-build's chroot operations are
  privileged). CI runners have NOPASSWD; local devs run with sudo.

steps:
- name: bty_wheel_stage
  uses: bty_wheel_stage

- name: live_build
  uses: live_build

doc: |
  bty USB-Pi flasher build (Raspberry Pi OS customization)
  ========================================================

  Builds an arm64 Raspberry-Pi-bootable raw disk image so an
  operator can USB-boot a Pi 4 / CM4 / Pi 5 / CM5 directly into the
  bty flash TUI and reflash the box's eMMC or NVMe HAT without
  taking the enclosure apart.

  Rather than building a live image (which fights the Pi's split
  per-SoC vendor kernels + single-initrd live-boot model), this
  customizes the official Raspberry Pi OS Lite (arm64) image in
  place. RPiOS already ships every Pi kernel + every ``bcm*.dtb``
  (incl. the CM5 / CM5IO device trees) + firmware + bootloader, so
  the result boots every supported board with no per-board
  branching. bty is grafted on: the runtime + flash tooling, the
  includes.chroot tree (services + scripts + banner), and the bty
  chroot hooks run verbatim inside the RPiOS chroot.

  Steps:

  1. ``bty_wheel_stage`` - builds the bty-lab wheel from the parent
     repo and stages it under
     ``live-build/config/includes.chroot/opt/bty/``. The
     ``0500-bty-install`` hook installs it (with the ``[tui]``
     extra) into ``/opt/bty/venv`` during customization.
  2. ``rpios_image_build`` - downloads RPiOS Lite (arm64), grows the
     root for headroom, loop-mounts + chroots, installs the bty
     runtime + flash tooling, drops in the includes.chroot tree,
     runs the bty hooks, masks RPiOS's first-boot user wizard so the
     box boots straight into the bty TUI, strips per-instance
     identity, and gzips the raw .img. Publishes
     ``bty-usbboot-rpi-arm64-v<version>.img.gz`` plus a sha256 manifest
     under ``publish.dir``.

  Requires passwordless sudo (loop-mount + chroot are privileged)
  and the host tools ``losetup`` / ``growpart`` (cloud-guest-utils)
  / ``e2fsprogs`` / ``xz`` / ``curl``. The build host MUST be native
  arm64 (``ubuntu-24.04-arm`` on GitHub Actions; a local Pi5 /
  equivalent for dev). Cross-build via qemu-user-static is not
  supported: the chroot-stage hooks misbehave under binfmt.

steps:
- name: bty_wheel_stage
  uses: bty_wheel_stage

- name: rpios_image_build
  uses: rpios_image_build

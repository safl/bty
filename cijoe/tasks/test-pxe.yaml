doc: |
  PXE chain end-to-end test (Phase 2 / Tier 1 verification).

  Spins up two QEMU VMs sharing an L2 segment via ``-netdev socket``:
  the server VM runs the bty server image (dnsmasq + bty-web with
  pre-baked test config); the client VM PXE-boots on that segment.
  The test asserts the chain completes by grepping the client's
  serial-console log for marker strings emitted at each stage of the
  boot pipeline (iPXE binary loaded, /pxe-bootstrap.ipxe fetched,
  per-MAC plan fetched, kernel + initrd loaded, live env booted,
  bty-flash-on-boot service started).

  Steps:

  1. ``pxe_customize_server`` - copies the pre-built server qcow2 to
     the cijoe run dir, virt-customises it with the test token, full-
     DHCP dnsmasq config, static-IP for the PXE NIC, and the live
     trio under ``/var/lib/bty/boot/``. Masks
     ``bty-web-init.service`` so the runtime first-boot init does
     not clobber the pre-baked token.

  2. ``pxe_run_chain_test`` - starts the server VM (mgmt NIC with
     ``hostfwd`` for HTTP-API access + PXE NIC on the socket), waits
     for ``/healthz``, ``PUT``s an assignment for the client's MAC
     with ``boot_policy=flash``, starts the client VM (PXE-boot,
     joined to the same socket), tails the client serial log,
     asserts every chain marker appears within the deadline.

  Wall clock: 5-10 minutes per run. Server + client serial logs land
  in the cijoe run dir as artefacts of the report.

steps:
- name: pxe_customize_server
  uses: pxe_customize_server

- name: pxe_run_chain_test
  uses: pxe_run_chain_test

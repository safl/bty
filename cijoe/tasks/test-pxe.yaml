doc: |
  PXE chain end-to-end test (containerized bty-web + bridged QEMU client)
  =======================================================================

  Brings bty-web up as a container and PXE-boots a QEMU client VM against it
  over a host bridge. Asserts the chain completes by grepping the client's
  serial-console log for marker strings emitted at each stage of the boot
  pipeline (iPXE binary loaded, /pxe-bootstrap.ipxe fetched, per-MAC chain
  fetched, kernel + initrd + squashfs loaded, ``bty: auto-flash starting`` /
  ``bty: flash complete; rebooting`` on /dev/console).

  Steps:

  1. ``pxe_prepare`` - builds the bty-web image from this checkout and stages
     the live trio + a small dummy flash image for upload.

  2. ``pxe_run_chain_test`` - creates a host bridge + client tap, starts a
     test-side dnsmasq (DHCP + TFTP) on the bridge, runs the bty-web container
     (published :8080, gated by the admin password), drives the HTTP API to seed
     the live trio + dummy image + a per-MAC ``boot_mode=bty-flash-always``
     assignment, starts the client VM (PXE-boot on the tap), tails the client
     serial log, and asserts every chain marker appears within the deadline.

  Needs root (bridge/tap/dnsmasq) and KVM. Wall clock: a few minutes per run.

steps:
- name: pxe_prepare
  uses: pxe_prepare

- name: pxe_run_chain_test
  uses: pxe_run_chain_test

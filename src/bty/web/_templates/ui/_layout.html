<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}bty-web{% endblock %}</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/sse.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/ui/dashboard">bty-web <small class="text-muted">{{ version }}</small></a>
        {% if logged_in %}
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/ui/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/machines">Machines</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/images">Images</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/boot">Boot</a></li>
        </ul>
        <form action="/ui/logout" method="post" class="d-inline">
            <button class="btn btn-outline-light btn-sm" type="submit">Log out</button>
        </form>
        {% endif %}
    </div>
</nav>

<main class="container py-4">
    {% if flash %}
    <div class="alert alert-{{ flash_kind or 'info' }}">{{ flash }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}bty-web{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/bty-favicon.png">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/bootstrap-icons.min.css">
    <style>
        /* Brand strip: a thin gradient accent above the navbar so the
           appliance has a recognisable look beyond stock Bootstrap. */
        .bty-accent {
            height: 3px;
            background: linear-gradient(90deg, #0d6efd 0%, #6610f2 50%, #d63384 100%);
        }
        .navbar-brand .brand-icon {
            font-size: 1.4rem;
            vertical-align: -0.15rem;
        }
        .navbar .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            margin-right: 0.25rem;
            border-radius: 0.5rem;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: background-color 0.15s;
        }
        .navbar .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.10);
            color: #fff;
        }
        .navbar .nav-btn.active {
            background-color: #0d6efd;
            color: #fff;
            box-shadow: 0 0 0 1px rgba(13, 110, 253, 0.6);
        }
        .navbar .nav-btn i {
            font-size: 1.05rem;
        }
        /* User-bar: a single pill containing username + logout, with a
           thin vertical divider between them. Visually one widget,
           but two click targets and zero JavaScript. */
        .user-bar {
            display: inline-flex;
            align-items: stretch;
            border-radius: 999px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            font-size: 0.85rem;
        }
        .user-bar-name {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.8rem;
            color: rgba(255, 255, 255, 0.92);
        }
        .user-bar-name code {
            color: #fff;
            background: transparent;
            padding: 0;
        }
        .user-bar-divider {
            width: 1px;
            background-color: rgba(255, 255, 255, 0.18);
        }
        .user-bar-logout {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.7rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            transition: background-color 0.15s, color 0.15s;
        }
        .user-bar-logout:hover,
        .user-bar-logout:focus {
            background-color: rgba(220, 53, 69, 0.65); /* danger red on hover */
            color: #fff;
            outline: none;
        }

        /* SSE visual cues. The page-level "live" indicator pulses
           when an event arrives; the swapped fragment gets a brief
           green wash so the operator's eye snaps to where the change
           landed. ``prefers-reduced-motion`` users see no animation. */
        .live-indicator i {
            display: inline-block;
        }
        @keyframes bty-pulse {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.45); }
            100% { transform: scale(1); }
        }
        .live-indicator.pulsing i {
            animation: bty-pulse 0.45s ease-out;
        }
        @keyframes bty-flash {
            0%   { background-color: rgba(40, 167, 69, 0.20); }
            100% { background-color: transparent; }
        }
        .sse-target.flashing {
            animation: bty-flash 0.7s ease-out;
        }
        @media (prefers-reduced-motion: reduce) {
            .live-indicator.pulsing i,
            .sse-target.flashing {
                animation: none;
            }
        }
    </style>
    <script src="/static/htmx.min.js"></script>
    <script src="/static/sse.js"></script>
</head>
<body class="bg-light">
<div class="bty-accent"></div>
<nav class="navbar navbar-expand-md bg-dark navbar-dark py-2">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/ui/dashboard">
            <i class="bi bi-hdd-network-fill brand-icon text-info me-1"></i>bty-web
            <span class="badge bg-secondary fw-normal ms-1">{{ version }}</span>
        </a>
        {% if logged_in %}
        <div class="d-flex flex-grow-1 align-items-center flex-wrap">
            <div class="me-auto d-flex flex-wrap">
                <a class="nav-btn {% if nav_active == 'dashboard' %}active{% endif %}" href="/ui/dashboard">
                    <i class="bi bi-speedometer2"></i>Dashboard
                </a>
                <a class="nav-btn {% if nav_active == 'machines' %}active{% endif %}" href="/ui/machines">
                    <i class="bi bi-pc-display"></i>Machines
                </a>
                <a class="nav-btn {% if nav_active == 'images' %}active{% endif %}" href="/ui/images">
                    <i class="bi bi-disc"></i>Images
                </a>
                <a class="nav-btn {% if nav_active == 'boot' %}active{% endif %}" href="/ui/boot">
                    <i class="bi bi-box-seam"></i>Boot
                </a>
                <a class="nav-btn {% if nav_active == 'events' %}active{% endif %}" href="/ui/events">
                    <i class="bi bi-clock-history"></i>Events
                </a>
                <a class="nav-btn {% if nav_active == 'settings' %}active{% endif %}" href="/ui/settings">
                    <i class="bi bi-gear"></i>Settings
                </a>
            </div>
            <div class="user-bar ms-md-3 mt-2 mt-md-0"
                 title="OS user that bty-web is running as (PAM auth)">
                <span class="user-bar-name">
                    <i class="bi bi-person-circle"></i>
                    <code>{{ service_user }}</code>
                </span>
                <span class="user-bar-divider"></span>
                <form action="/ui/logout" method="post" class="m-0 d-inline-flex">
                    <button type="submit" class="user-bar-logout"
                            title="Sign out">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
</nav>

<main class="container py-4">
    {% if flash %}
    <div class="alert alert-{{ flash_kind or 'info' }}">{{ flash }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script>
// SSE visual cues. ``htmx:sseMessage`` fires once per server event;
// ``htmx:afterSwap`` fires once the swap has actually rendered. We
// pulse every ``.live-indicator`` icon on the page when an event
// arrives, and flash the swap target's background green so the eye
// snaps to it. Resetting the class with a forced reflow lets the
// animation re-trigger if events fire faster than the keyframes.
(function () {
    function blink(el, cls) {
        if (!el) return;
        el.classList.remove(cls);
        // eslint-disable-next-line no-unused-expressions
        el.offsetWidth;
        el.classList.add(cls);
    }
    document.body.addEventListener("htmx:sseMessage", function () {
        document.querySelectorAll(".live-indicator").forEach(function (i) {
            blink(i, "pulsing");
        });
    });
    document.body.addEventListener("htmx:afterSwap", function (evt) {
        if (evt.target && evt.target.classList.contains("sse-target")) {
            blink(evt.target, "flashing");
        }
    });
})();
</script>
</body>
</html>

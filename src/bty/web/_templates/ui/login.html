{% extends "ui/_layout.html" %}
{% block title %}Log in - bty-web{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h1 class="h4 mb-3">Log in</h1>
                <p class="text-muted small">
                    Paste the bearer token configured as <code>BTY_WEB_TOKEN</code>
                    on the server.
                </p>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="/ui/login" method="post">
                    <div class="mb-3">
                        <label for="token" class="form-label">Token</label>
                        <input type="password" class="form-control" id="token"
                               name="token" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Log in</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

doc: |
  bty USB live appliance build
  ============================

  Build a bty USB-live appliance image from a Debian cloud image.

  Steps:

  1. ``gen_userdata`` assembles a cloud-init user-data file by inlining
     every file under ``rootfs/`` as ``write_files`` entries on top of
     the ``auxiliary/cloudinit-base.user`` template.
  2. ``diskimage_build`` downloads the Debian cloud image, resizes the
     boot disk, builds the cloud-init seed.iso, and boots QEMU.
     cloud-init provisions the system and powers off; ``qemu-img
     convert -c`` produces a baked qcow2.
  3. ``img_zst_publish`` converts the qcow2 to raw and zstd-compresses
     it into a dd-able ``.img.zst`` artifact, alongside a sha256sum.

steps:
- name: gen_userdata
  uses: gen_userdata

- name: diskimage_build
  uses: diskimage_build
  with:
    image_name: bty-usb-x86_64

- name: img_zst_publish
  uses: img_zst_publish
  with:
    image_name: bty-usb-x86_64

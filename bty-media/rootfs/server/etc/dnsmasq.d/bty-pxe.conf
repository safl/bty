# bty server PXE boot stack (TFTP + proxy-DHCP)
#
# TFTP is enabled and serves the iPXE binaries from
# /var/lib/tftpboot. The proxy-DHCP + iPXE chain directives at the
# bottom are commented out by default - activate via the Settings
# page in the bty-web UI (which writes
# /etc/dnsmasq.d/bty-pxe-active.conf) or by editing this file
# manually.
#
# Why disabled by default: an active DHCP responder on an unknown
# network (e.g. an office subnet with an existing DHCP server)
# could disrupt other clients. Proxy-DHCP only answers PXE-specific
# queries, but the safest default is dormant.

# Disable dnsmasq's DNS service: bty-server only uses dnsmasq for
# TFTP and (optionally) proxy-DHCP. systemd-resolved owns port 53.
port=0

# === TFTP (always on) =====================================================
enable-tftp
tftp-root=/var/lib/tftpboot

# === Boot-stack activation block ==========================================
#
# Activate the boot stack by uncommenting EVERYTHING below this line
# AND substituting the subnet of the network you want to serve PXE
# on. Then run:  systemctl restart dnsmasq
#
# # Bind to a specific interface (operator's PXE NIC):
# bind-interfaces
# interface=eth0
#
# # Proxy-DHCP only - does not assign IPs, just answers PXE queries.
# # Replace the network with the operator's subnet:
# dhcp-range=192.168.1.0,proxy
#
# # Architecture detection (DHCP option 93, RFC 4578 / iPXE):
# dhcp-match=set:bios,option:client-arch,0
# dhcp-match=set:efi,option:client-arch,7
# dhcp-match=set:efi,option:client-arch,9
#
# # iPXE userclass: a loaded iPXE binary identifies as 'iPXE' on its
# # second-stage DHCP. First-stage requests from the PXE ROM don't.
# dhcp-userclass=set:ipxe,iPXE
#
# # Stage 1: non-iPXE PXE ROMs get the iPXE binary for their arch.
# dhcp-boot=tag:!ipxe,tag:bios,undionly.kpxe
# dhcp-boot=tag:!ipxe,tag:efi,ipxe.efi
#
# # Stage 2: iPXE chains to the bty-web bootstrap script over HTTP.
# # ${next-server} is set by dnsmasq's siaddr; iPXE substitutes it
# # at boot time before fetching the URL.
# dhcp-boot=tag:ipxe,http://${next-server}:8080/pxe-bootstrap.ipxe

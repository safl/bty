# dnsmasq is intentionally idle on the bty-server appliance.
#
# PXE proxy-DHCP: bty-pxe-proxy.service (Python daemon shipped in
#                 the bty-lab package).
# TFTP:           bty-tftp.service (Python daemon, same package).
#
# dnsmasq used to do both -- in v0.13.x it served proxy-DHCP via
# pxe-service directives and the TFTP role via its built-in
# TFTP daemon. We replaced both because dnsmasq 2.91's proxy-DHCP
# doesn't put the bootfile in the OFFER for modern UEFI firmware
# (see project_dnsmasq_proxy_dhcp_dead_end memory note), and once
# we owned the DHCP side it was a small step to own the file-
# transfer role too.
#
# dnsmasq stays installed because the Debian cloud image's
# baseline expects it as the local DNS resolver in some configs,
# and ripping it out across an in-place upgrade is more friction
# than letting it idle. ``port=0`` disables DNS service so the
# daemon never opens any port.

# Disable dnsmasq's DNS service.
port=0

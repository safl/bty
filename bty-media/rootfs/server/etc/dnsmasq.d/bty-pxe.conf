# bty-server PXE / TFTP support via dnsmasq.
#
# dnsmasq serves TFTP-only: the iPXE binaries staged at
# /var/lib/tftpboot/ get handed out to PXE clients when the LAN's
# DHCP server (the operator's router / UniFi / pfSense / dhcpd)
# tells them to come fetch ``ipxe.efi`` (or arch sibling) from
# this appliance.
#
# Architecture: operator router owns DHCP + PXE option tagging
# (option 60 = "PXEClient", option 66 = bty-server IP, option 67
# = "ipxe.efi"). bty serves TFTP + HTTP only. We deliberately do
# NOT do proxy-DHCP: a previous attempt (bty-pxe-proxy in v0.14
# through v0.17) failed against strict UEFI firmware that filters
# DHCP offers by option 60 + Your-IP being in the same offer. The
# router does the offer-tagging cleanly; bty stays out of the
# DHCP fight entirely.

# Disable dnsmasq's DNS service entirely (we only want TFTP from
# this daemon). Without ``port=0`` dnsmasq would bind UDP 53 and
# fight whatever the operator's network has for DNS.
port=0

# TFTP root: bty-server stages ipxe.efi + arch-specific siblings
# here via symlinks into /usr/lib/ipxe/ (Debian package layout).
# The TFTP serve path is intentionally tiny -- only iPXE binaries
# the operator's router could ever ask for.
enable-tftp
tftp-root=/var/lib/tftpboot

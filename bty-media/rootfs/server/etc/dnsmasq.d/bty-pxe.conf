# bty server: dnsmasq is reduced to a TFTP daemon.
#
# Everything PXE-related runs in bty-pxe-proxy.service (a Python
# daemon shipped in the bty-lab package). That daemon answers
# PXEClient / HTTPClient DHCP discovers with offers carrying the
# bootfile in BOTH option 67 AND the BOOTP file[] field -- the
# thing dnsmasq's own proxy-DHCP refuses to do reliably for modern
# UEFI firmware (8 config variations tried in v0.13.x, all
# resulted in a bare 4-option offer that modern UEFI rejects).
#
# Activate via /ui/settings -- that writes /etc/default/bty-pxe-
# proxy and starts bty-pxe-proxy.service. Stays dormant otherwise.

# Disable dnsmasq's DNS service: bty-server only uses dnsmasq for
# TFTP. systemd-resolved owns port 53.
port=0

# TFTP serves the iPXE binaries the proxy daemon points clients at
# (undionly.kpxe for legacy BIOS, ipxe.efi for UEFI).
enable-tftp
tftp-root=/var/lib/tftpboot
